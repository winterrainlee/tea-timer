<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="차 한 잔의 시간">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#2a2111"/>
      <stop offset="58%" stop-color="#18110b"/>
      <stop offset="100%" stop-color="#120d09"/>
    </radialGradient>
    <linearGradient id="smokeRing" x1="140" y1="96" x2="372" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f1eee6"/>
      <stop offset="52%" stop-color="#d9d4c8"/>
      <stop offset="100%" stop-color="#aaa394"/>
    </linearGradient>
    <linearGradient id="matchaCup" x1="152" y1="270" x2="360" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4cd84"/>
      <stop offset="55%" stop-color="#93a55d"/>
      <stop offset="100%" stop-color="#667d42"/>
    </linearGradient>
    <linearGradient id="matchaLiquid" x1="158" y1="284" x2="354" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ced894"/>
      <stop offset="58%" stop-color="#8fa65d"/>
      <stop offset="100%" stop-color="#5c733e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"/>
      <feFlood flood-color="#d9d4c8" flood-opacity="0.22"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#120d09"/>
  <rect width="512" height="512" fill="url(#bg)"/>

  <g transform="translate(256 256) scale(0.84) translate(-256 -256)">
