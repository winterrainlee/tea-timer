<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="amb" cx="50%" cy="58%" r="42%">
      <stop offset="0%" stop-color="#2a2210"/>
      <stop offset="100%" stop-color="#120d09"/>
    </radialGradient>
  </defs>

  <!-- Background fills entire canvas -->
  <rect width="512" height="512" fill="#120d09"/>
  <rect width="512" height="512" fill="url(#amb)"/>

  <!-- All content scaled to fit within central 80% safe zone (51–461) -->
  <g transform="translate(256,280) scale(0.72)" stroke="#cdbf63" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cup body -->
    <path d="M-112,-35 C-113,8 -58,42 -44,48 Q0,58 44,48 C58,42 113,8 112,-35"
          stroke-width="14"/>
    <!-- Rim -->
    <ellipse cx="0" cy="-35" rx="112" ry="12" stroke-width="8" opacity="0.35"/>
    <!-- Foot -->
    <line x1="-22" y1="50" x2="-22" y2="64" stroke-width="8"/>
    <line x1="22" y1="50" x2="22" y2="64" stroke-width="8"/>
    <line x1="-28" y1="64" x2="28" y2="64" stroke-width="9"/>
  </g>

  <!-- Steam scaled -->
  <g transform="translate(256,280) scale(0.72)" stroke="#cdbf63" fill="none" stroke-linecap="round" stroke-width="9">
    <path d="M-34,-52 C-44,-84 -24,-104 -34,-136 C-44,-168 -24,-188 -34,-218" opacity="0.45"/>
    <path d="M20,-60 C10,-94 30,-116 20,-150 C10,-184 30,-206 20,-236" opacity="0.3"/>
  </g>

  <!-- Clock scaled -->
  <g transform="translate(370,155)" stroke="#cdbf63" fill="none">
    <circle r="36" stroke-width="5" fill="#120d09"/>
    <line x1="0" y1="-27" x2="0" y2="-21" stroke-width="4" stroke-linecap="round"/>
    <line x1="27" y1="0" x2="21" y2="0" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="27" x2="0" y2="21" stroke-width="4" stroke-linecap="round"/>
    <line x1="-27" y1="0" x2="-21" y2="0" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="-9" y2="-14" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="14" y2="-11" stroke-width="3.5" stroke-linecap="round"/>
    <circle r="4" fill="#cdbf63"/>
  </g>
</svg>
