      <circle cx="256" cy="256" r="172" fill="none" stroke="#6a665d" stroke-width="22" opacity="0.24"/>
      <path
        d="M256 66
           C358 66 438 142 456 233
           C480 360 384 454 256 458
           C184 456 128 424 110 356
           C108 352 111 349 115 350
           C118 350 120 352 122 356
           C154 397 203 426 256 428
           C365 425 441 334 418 233
           C400 154 332 103 256 104
           C244 104 236 96 237 85
           C238 74 245 66 256 66Z"
        fill="url(#smokeRing)"
      />
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M225 222c-24-38 20-57-1-94" stroke="#efe6d6" stroke-width="18" opacity="0.78"/>
      <path d="M286 216c-19-31 18-50 2-86" stroke="#efe6d6" stroke-width="14" opacity="0.5"/>

      <path d="M154 294c38 21 166 21 204 0c-15 62-57 104-102 104s-87-42-102-104Z" fill="url(#matchaLiquid)" opacity="0.92"/>
      <path d="M151 286c34 22 176 22 210 0" stroke="#c7d58d" stroke-width="18" opacity="0.72"/>
      <path d="M140 286c9 67 61 112 116 112s107-45 116-112" stroke="url(#matchaCup)" stroke-width="30"/>
