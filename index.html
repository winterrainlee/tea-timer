<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#120d09">
<title>차 한 잔의 시간 · Time for Tea</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#120d09; --bg-1:#1d150e; --glow:#37301a;
    --gold:#cdbf63; --gold-soft:#e4d691; --gold-line:#6b5f30;
    --ink:#efe6d6; --ink-dim:#9c8f78; --ink-faint:#7d715c; --line:#3a3322; --track:#4a4128;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 75% at 50% 30%, var(--glow) 0%, var(--bg-1) 46%, var(--bg-0) 82%);
    color:var(--ink); font-family:"Gowun Batang",serif;
    min-height:100%; overflow:hidden; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .app{
    position:relative; width:min(100vw,460px); margin:0 auto; min-height:100%;
    display:flex; flex-direction:column; gap:.45rem;
    padding:calc(.85rem + env(safe-area-inset-top)) 1.05rem calc(.85rem + env(safe-area-inset-bottom));
  }
  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); clip-path:inset(50%); white-space:nowrap; border:0;
  }

  /* header */
  .top-actions{
    position:absolute; top:calc(.65rem + env(safe-area-inset-top)); left:.8rem; right:.8rem; z-index:30;
    display:flex; align-items:center; justify-content:space-between; pointer-events:none;
  }
  .top-actions button, .top-actions a{
    pointer-events:auto; min-height:44px; border:0; background:none; color:var(--ink-dim); cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; text-decoration:none;
  }
  .top-actions .reset-top{
    min-width:78px; padding:0 .2rem; font-family:inherit; font-size:1.15rem;
  }
  .top-actions .help-link{
    width:44px; font-family:"Gowun Batang",serif; font-size:1.12rem; font-weight:700;
  }
  .top-actions button:active, .top-actions a:active{ color:var(--gold-soft); }
  .hdr{ text-align:center; flex:0 0 auto; }
  .hdr .title{ font-size:1.18rem; font-weight:700; color:var(--gold-soft); letter-spacing:.06em; }
  .hdr .sub{ font-family:"Space Mono",monospace; font-size:.62rem; letter-spacing:.18em; color:var(--ink-dim); margin-top:.18rem; }

  /* tea first */
  .tea-picker{ position:relative; z-index:12; flex:0 0 auto; margin-top:.45rem; }

  /* hero */
  .hero{ position:relative; flex:1 1 auto; min-height:190px; display:flex; align-items:center; justify-content:center; }
  .hero svg.stage{ width:100%; height:100%; max-height:40vh; display:block; }
  .halo{ position:absolute; left:50%; top:48%; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; opacity:0; transition:opacity .4s; }
  .halo.h1{ width:54%; aspect-ratio:1; border:2px solid rgba(205,191,99,.5); }
  .halo.h2{ width:40%; aspect-ratio:1; border:1.5px solid rgba(228,214,145,.45); }
  .urgent .halo{ animation:halo 1s ease-in-out infinite; }
  .urgent .halo.h2{ animation-delay:.25s; }
  @keyframes halo{ 0%,100%{opacity:.2;transform:translate(-50%,-50%) scale(1)} 50%{opacity:.55;transform:translate(-50%,-50%) scale(1.08)} }

  .readout{ position:absolute; left:0; right:0; top:var(--readout-top,31%); transform:translateY(-50%); text-align:center; pointer-events:none; }
  .readout .time{ font-family:"Space Mono",monospace; font-weight:700; font-size:2.2rem; letter-spacing:.02em; color:var(--ink); text-shadow:0 1px 8px rgba(0,0,0,.78); transition:color .3s; }
  .readout.done .time, .urgent .readout .time{ color:var(--gold-soft); }
  .urgent .readout .time{ animation:num 1s ease-in-out infinite; }
  @keyframes num{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .message{ position:absolute; top:1.5%; left:50%; transform:translateX(-50%); font-size:.9rem; letter-spacing:.08em; color:var(--ink-dim); white-space:nowrap; text-align:center; text-shadow:0 1px 6px rgba(0,0,0,.7); transition:color .3s; z-index:6; }
  .message:empty{ display:none; }
  .message.gold{ color:var(--gold-soft); text-shadow:0 0 12px rgba(228,214,145,.45); }
  .tea-preview{
    position:absolute; left:50%; top:4.05rem; z-index:5; width:min(70%,270px); aspect-ratio:5/1;
    transform:translateX(-50%); pointer-events:none; opacity:.9;
    transition:opacity .24s ease, transform .24s ease; filter:drop-shadow(0 8px 12px rgba(0,0,0,.42));
  }
  .tea-preview.hide{ opacity:0; transform:translateX(-50%) translateY(-6px); }
  .tea-preview .chahe{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:.94; }
  .tea-preview .dry-leaves{
    position:absolute; left:24%; top:14%; width:52%; height:68%; overflow:visible;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.42));
  }
  .tea-picker.locked .tea-preview{ opacity:0; transform:translateX(-50%) translateY(-6px); }
  .tea-picker.locked .dots, .tea-picker.locked .chev, .tea-picker.locked .ghost{ opacity:0; pointer-events:none; }
  .tea-picker.locked .cur{ color:var(--ink-dim); text-shadow:none; }
  .vessel-nav{
    position:absolute; top:55%; transform:translateY(-50%); z-index:7;
    width:44px; height:44px; border:0; background:none; color:var(--ink-dim);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .vessel-nav.prev{ left:-.25rem; }
  .vessel-nav.next{ right:-.25rem; }
  .vessel-nav svg{ width:22px; height:22px; }
  /* controls */
  .controls{ flex:0 0 auto; display:flex; flex-direction:column; gap:.55rem; }
  .carousel{ display:flex; align-items:center; gap:.25rem; padding:0 3rem; }
  .carousel .chev{ position:absolute; top:4.1rem; z-index:8; transform:translateY(-50%); background:none; border:none; color:var(--ink-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; min-width:44px; min-height:44px; padding:0; transition:opacity .2s; }
  .carousel .chev:first-child{ left:0; }
  .carousel .chev:last-child{ right:0; }
  .carousel .chev svg{ width:20px; height:20px; }
  .carousel .track{
    flex:1; display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center; column-gap:.72rem; overflow:hidden; height:42px;
  }
  .carousel .ghost{ font-size:.72rem; color:var(--ink-faint); opacity:.55; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .carousel .ghost:first-child{ text-align:right; }
  .carousel .ghost:last-child{ text-align:left; }
  .carousel .cur{
    display:inline-flex; align-items:center; justify-content:center; gap:.42rem;
    flex:none; white-space:nowrap; padding:0 .35rem; color:var(--gold-soft);
    font-size:1.04rem; font-weight:700; letter-spacing:.02em; text-shadow:0 0 10px rgba(228,214,145,.22);
  }
  .carousel .cur .tea-dot{
    width:8px; height:8px; border-radius:50%; flex:none; box-shadow:0 0 8px rgba(228,214,145,.22);
  }
  .dots{ position:absolute; left:0; right:0; top:7.95rem; display:flex; gap:.25rem; justify-content:center; align-items:center; margin-top:0; transition:opacity .2s; }
  .dots i{ width:5px; height:5px; border-radius:50%; background:var(--track); transition:width .2s,background .2s; }
  .dots i.on{ width:13px; border-radius:3px; background:var(--gold); }

  .slider-row{ padding:.08rem 0 .12rem; margin-top:-2rem; }
  .slider-row .top{ display:flex; align-items:center; justify-content:center; gap:.45rem; font-size:1.032rem; color:var(--ink-dim); margin-bottom:.12rem; }
  .slider-row .temp-hint{
    font-family:"Space Mono",monospace; font-size:.768rem; letter-spacing:.05em; color:var(--gold-soft);
    opacity:.86; transform:translateY(.02rem);
  }
  .infusion-line{
    min-height:1.15rem; margin-bottom:.28rem; color:var(--ink-faint); font-size:.96rem; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.04em;
  }
  .slider-row .val{
    display:block; text-align:center; font-family:"Gowun Batang",serif; font-weight:700;
    font-size:2.64rem; line-height:1; color:var(--gold-soft); margin:0 0 .42rem;
    text-shadow:0 1px 10px rgba(0,0,0,.45);
  }
  .slider-line{ display:flex; align-items:center; gap:.75rem; }
  .step{ width:48px; height:48px; flex:none; border-radius:50%; border:0.5px solid var(--line); background:rgba(255,255,255,.02); color:var(--ink-dim); font-size:1.35rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .step:active{ background:rgba(255,255,255,.06); }
  input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:8px; border-radius:999px; outline:none;
    background:linear-gradient(90deg,var(--gold) 0%,var(--gold) var(--p,20%),var(--track) var(--p,20%),var(--track) 100%);
  }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:30px; height:30px; border-radius:50%; background:var(--gold-soft); border:2px solid #2a2414; box-shadow:0 0 10px rgba(205,191,99,.55); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:30px; height:30px; border-radius:50%; background:var(--gold-soft); border:2px solid #2a2414; cursor:pointer; }
  input[type=range]:disabled{ opacity:.45; }

  .brew{ width:100%; font-family:"Gowun Batang",serif; font-weight:700; letter-spacing:.1em; font-size:1.02rem; color:var(--bg-0); background:linear-gradient(180deg,var(--gold-soft),var(--gold)); border:none; border-radius:999px; padding:.9rem 0; cursor:pointer; transition:filter .15s,transform .1s,opacity .2s; }
  .brew:active{ transform:translateY(1px); }
  .brew[disabled]{ opacity:.5; filter:grayscale(.25); cursor:default; background:none; border:0.5px solid var(--line); color:var(--ink-dim); }

  .footer{ display:flex; align-items:center; justify-content:space-between; font-size:.72rem; color:var(--ink-dim); }
  .footer button{ background:none; border:none; color:var(--ink-dim); cursor:pointer; font-family:inherit; font-size:.74rem; display:inline-flex; align-items:center; justify-content:center; gap:.3rem; min-height:44px; min-width:44px; }
  .footer button:active{ color:var(--gold-soft); }
  .footer button svg{ width:20px; height:20px; }
  .footer .clap-button{ font-size:1.22rem; line-height:1; filter:drop-shadow(0 1px 5px rgba(0,0,0,.28)); }
  .footer button.muted .wave{ opacity:0; }
  .footer button .slash{ opacity:0; }
  .footer button.muted .slash{ opacity:1; }

  .modal-backdrop{
    position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
    padding:1rem; background:rgba(6,4,2,.58); backdrop-filter:blur(5px);
  }
  .modal-backdrop[hidden]{ display:none; }
  .support-modal{
    position:relative; width:min(100%,330px); border:1px solid rgba(205,191,99,.28); border-radius:8px;
    background:linear-gradient(180deg,rgba(37,28,18,.98),rgba(20,14,9,.98)); color:var(--ink);
    padding:1.35rem 1.2rem 1.15rem; box-shadow:0 20px 48px rgba(0,0,0,.52);
    text-align:center;
  }
  .support-modal h2{ font-size:1.12rem; color:var(--gold-soft); margin-bottom:.72rem; }
  .support-modal p{ font-size:.94rem; line-height:1.62; color:var(--ink); word-break:keep-all; }
  .modal-close{
    position:absolute; top:.35rem; right:.38rem; width:44px; height:44px; border:0; background:none;
    color:var(--ink-dim); cursor:pointer; font-size:1.3rem; line-height:1;
  }
  .modal-actions{ display:flex; align-items:center; justify-content:center; gap:.55rem; margin-top:1.1rem; }
  .modal-actions[hidden], .modal-actions button[hidden]{ display:none; }
  .modal-actions button{
    min-height:42px; border-radius:8px; border:1px solid var(--gold-line); padding:0 .95rem;
    font-family:inherit; font-size:.92rem; cursor:pointer;
  }
  .modal-primary{ background:var(--gold-soft); color:var(--bg-0); }
  .modal-ghost{ background:transparent; color:var(--ink-dim); }

  .flash{ position:fixed; inset:0; background:#fffae4; opacity:0; pointer-events:none; z-index:50; }
  .flash.go{ animation:flash 1.4s ease-out 1; }
  @keyframes flash{ 0%{opacity:0} 12%{opacity:.5} 100%{opacity:0} }

  @media (prefers-reduced-motion: reduce){
    .urgent .halo,.urgent .readout .time{ animation:none; }
    .flash.go{ animation:none; }
  }
  @media (max-height: 720px){
    .app{ gap:.34rem; padding:calc(.7rem + env(safe-area-inset-top)) .95rem calc(.7rem + env(safe-area-inset-bottom)); }
    .hdr .title{ font-size:1.05rem; }
    .hdr .sub{ margin-top:.12rem; }
    .hero{ min-height:160px; }
    .hero svg.stage{ max-height:35vh; }
    .tea-picker{ margin-top:.32rem; }
    .tea-preview{ top:3.25rem; width:min(66%,248px); opacity:.86; }
    .controls{ gap:.42rem; }
    .carousel{ padding:0 2.7rem; }
    .carousel .chev{ top:3.5rem; }
    .carousel .track{ height:38px; }
    .dots{ top:6.65rem; }
    .slider-row{ margin-top:-.72rem; }
    .slider-row .top{ font-size:.936rem; gap:.38rem; }
    .slider-row .temp-hint{ font-size:.696rem; }
    .infusion-line{ font-size:.864rem; margin-bottom:.2rem; }
    .slider-row .val{ font-size:2.28rem; margin-bottom:.3rem; }
    .step{ width:44px; height:44px; }
    input[type=range]::-webkit-slider-thumb{ width:26px; height:26px; }
    input[type=range]::-moz-range-thumb{ width:26px; height:26px; }
    .brew{ padding:.78rem 0; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-actions">
    <button class="reset-top" id="reset">처음부터</button>
    <a class="help-link" href="help.html" aria-label="도움말 열기" title="도움말">ⓘ</a>
  </div>

  <div class="hdr">
    <div class="title">차 한 잔의 시간</div>
    <div class="sub">Time for Tea</div>
    <div class="sr-only" aria-live="polite"><span id="teaName">청향 우롱</span> · <span id="infLabel">第一泡</span> · <span id="infKo">첫 우림</span></div>
  </div>

  <div class="tea-picker">
    <div class="carousel">
      <button class="chev" id="teaPrev" aria-label="이전 차"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="track">
        <span class="ghost" id="teaGhostL"></span>
        <span class="cur"><span class="tea-dot" id="teaDot"></span><span id="teaCur">청향 우롱</span></span>
        <span class="ghost" id="teaGhostR"></span>
      </div>
      <button class="chev" id="teaNext" aria-label="다음 차"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="tea-preview" id="teaPreview" aria-hidden="true">
      <img class="chahe" src="assets/tea-preview/chahe.svg" alt="">
      <svg class="dry-leaves" id="dryLeaves" viewBox="0 0 220 82" focusable="false"></svg>
    </div>
    <div class="dots" id="dots"></div>
  </div>

	  <div class="hero" id="hero">
	    <div class="message" id="timeLabel" aria-live="polite"></div>
	    <button class="vessel-nav prev" id="vesselPrev" aria-label="이전 우림 도구"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="vessel-nav next" id="vesselNext" aria-label="다음 우림 도구"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    <div class="halo h1"></div>
    <div class="halo h2"></div>
    <svg class="stage" id="stage" viewBox="0 0 200 224" aria-label="차 우림 타이머 시각화">
      <defs>
        <radialGradient id="softTeaGlow" cx="50%" cy="44%" r="54%">
          <stop offset="0" stop-color="#fff1a6" stop-opacity=".24"/>
          <stop offset="1" stop-color="#fff1a6" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="liquorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop id="liquorTop" offset="0" stop-color="#cdbf63" stop-opacity=".78"/>
          <stop id="liquorBot" offset="1" stop-color="#cdbf63" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="pyLowerGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#cdbf63" stop-opacity=".80"/>
          <stop offset=".48" stop-color="#cdbf63" stop-opacity=".42"/>
          <stop offset="1" stop-color="#cdbf63" stop-opacity=".04"/>
        </linearGradient>
        <radialGradient id="mugSurfGrad" cx="50%" cy="42%" r="74%">
          <stop id="mugSurfCenter" offset="0" stop-color="#efe09a" stop-opacity=".82"/>
          <stop id="mugSurfEdge" offset="1" stop-color="#cdbf63" stop-opacity=".86"/>
        </radialGradient>
        <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#ffd27a" stop-opacity="1"/>
          <stop offset=".5" stop-color="#eaa84f" stop-opacity=".45"/>
          <stop offset="1" stop-color="#eaa84f" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="pourGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fff7e0" stop-opacity="0"/>
          <stop offset=".35" stop-color="#fff7e0" stop-opacity=".45"/>
          <stop offset="1" stop-color="#fff7e0" stop-opacity=".82"/>
        </linearGradient>
        <filter id="steamBlur" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="1.8"/>
        </filter>
        <filter id="vesselShadow" x="-30%" y="-30%" width="160%" height="170%">
          <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity=".34"/>
        </filter>
        <clipPath id="gBowl"><path d="M57 126 C58 139 60 148 60 152 C60 157 58 160 56 162 C53 164 74 166 100 166 C126 166 147 164 144 162 C142 160 140 157 140 152 C140 148 142 139 143 126 Z"/></clipPath>
        <clipPath id="pyOut"><path d="M71 149 C79 146 88 145 97 145 C106 145 115 146 123 149 L123 185 C123 191 113 193 97 193 C81 193 71 191 71 185 Z"/></clipPath>
        <clipPath id="pyIn"><path d="M77 105 L77 130 C77 139 86 144 97 144 C108 144 117 139 117 130 L117 105 Z"/></clipPath>
      </defs>

      <!-- ambient glow (opaque vessels) -->
      <ellipse id="ambient" cx="100" cy="124" rx="82" ry="76" fill="url(#ambientGlow)" opacity="0"/>

      <!-- ===== RASTER VESSEL LAYERS + SVG EFFECTS ===== -->
      <g id="v-teapot" class="vessel" style="display:none" filter="url(#vesselShadow)">
        <image href="assets/vessels/teapot.png" x="8" y="44" width="184" height="184" preserveAspectRatio="xMidYMid meet"/>
      </g>

      <g id="v-eastern-pot" class="vessel" style="display:none" filter="url(#vesselShadow)">
        <image href="assets/vessels/eastern-pot-zisha.png" x="16" y="48" width="168" height="168" preserveAspectRatio="xMidYMid meet"/>
      </g>

      <g id="v-gaiwan" class="vessel" filter="url(#vesselShadow)">
        <image href="assets/vessels/gaiwan-glass.png" x="14" y="55" width="172" height="172" preserveAspectRatio="xMidYMid meet"/>
        <g clip-path="url(#gBowl)" style="mix-blend-mode:multiply">
          <ellipse cx="100" cy="148" rx="46" ry="22" fill="url(#softTeaGlow)" opacity=".38"/>
          <path id="g-liquid" d="M100 166 Z" fill="#cdbf63" opacity="0"/>
          <path id="g-meniscus" d="M100 166" fill="none" stroke="#f4e6a0" stroke-width="1.2" stroke-linecap="round" opacity="0"/>
          <path id="g-wall-left" d="M100 166 Z" fill="#cdbf63" opacity="0"/>
          <path id="g-wall-right" d="M100 166 Z" fill="#cdbf63" opacity="0"/>
        </g>
        <g id="g-leaves" clip-path="url(#gBowl)" style="mix-blend-mode:multiply"></g>
        <image href="assets/vessels/gaiwan-glass.png" x="14" y="55" width="172" height="172" preserveAspectRatio="xMidYMid meet" opacity=".46"/>
        <g id="g-lid" opacity="0" style="display:none">
          <path d="M62 97 C74 91 88 88 100 88 C112 88 126 91 138 97" fill="none" stroke="rgba(255,250,232,.28)" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="100" cy="96" rx="39" ry="7" fill="none" stroke="rgba(255,250,232,.18)" stroke-width="1.1"/>
        </g>
      </g>

      <g id="v-mug" class="vessel" style="display:none" filter="url(#vesselShadow)">
        <image href="assets/vessels/mug.png" x="24" y="43" width="160" height="160" preserveAspectRatio="xMidYMid meet"/>
        <ellipse id="mug-surface" cx="96" cy="83" rx="34" ry="7.4" fill="url(#mugSurfGrad)" opacity="0"/>
      </g>

      <g id="v-piaoyibei" class="vessel" style="display:none" filter="url(#vesselShadow)">

<script>
(() => {
  let reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  const SVGNS = "http://www.w3.org/2000/svg";
  const $ = id => document.getElementById(id);
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v;
  const mix=(c1,c2,t)=>[lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)];
  const rgb=c=>`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;

  const SAT_K=3.2, SAT_D=1-Math.exp(-SAT_K);

  const koOrd=["","첫","두 번째","세 번째","네 번째","다섯 번째","여섯 번째","일곱 번째","여덟 번째","아홉 번째","열 번째"];
  const koInf=n=>n===1?"첫 우림":`${koOrd[n]||n+'번째'} 우림`;

  // ---- data ----
  const TEAS=[

    {id:"white",  name:"백차",      cjk:"白茶",   temp:90,  base:30, add:10, light:[236,220,160], strong:[216,180,110], peak:.55},
    {id:"oolong", name:"청향 우롱",  cjk:"清香烏龍", temp:95, base:20, add:5,  light:[222,210,132], strong:[198,176,86],  peak:.66},
    {id:"nong",   name:"농향 우롱",  cjk:"濃香烏龍", temp:98, base:20, add:5,  light:[201,143,67],  strong:[158,101,38],  peak:.78},
    {id:"black",  name:"홍차",      cjk:"紅茶",   temp:90,  base:12, add:5,  light:[196,98,42],   strong:[156,58,24],   peak:.82},

  ];
  const VESSELS=[

    {id:"piaoyibei", name:"표일배", label:"표일배 飄逸杯 · 유리 · 버튼 배수", family:"separator", culture:"gongfu", material:"glass", silhouette:"tall", vis:"chamber", round:false, readoutTop:"31%", done:"button", completion:"버튼 눌러 내리세요 · 出湯", asset:"assets/vessels/piaoyibei-glass.png", requiresSeparationAction:true, steepOffset:5},
  ];
  const VICONS={
    teapot:'<ellipse cx="20" cy="27" rx="12" ry="9"/><path d="M8 24 L2 21 L4 25 L10 28"/><path d="M32 24 C37 24 37 31 32 32"/><path d="M13 18 Q20 14 27 18"/><circle cx="20" cy="15" r="1.6"/>',
    "eastern-pot":'<ellipse cx="20" cy="28" rx="12" ry="8"/><path d="M8 26 L2 24 L4 28 L9 29"/><path d="M32 25 C37 24 37 32 32 33"/><path d="M14 21 Q20 18 26 21"/><circle cx="20" cy="18" r="1.4"/>',

    piaoyibei:'<path d="M12 19 L11 35 C11 37 15 38 20 38 C25 38 29 37 29 35 L28 19"/><ellipse cx="20" cy="18" rx="10" ry="2.6"/><path d="M20 18 L20 14"/><circle cx="20" cy="12.5" r="2.2"/><path d="M15 22 L15.4 30 M25 22 L24.6 30"/><path d="M15.4 30 L24.6 30" stroke-dasharray="2 2"/>',
  };

  // ---- state ----
  let teaIdx=2, vesselId="gaiwan", infusion=1, sec=20, pyDrained=false;
  let infusionHistory=[], activeBrew=null;
  let phase="idle"; // idle | pour | steep | done
  let pourStart=0, steepStart=0, steepMs=0, lastNow=performance.now();

    mug:{scale:.96,x:4,y:8.7},

  const vessel=()=>VESSELS.find(v=>v.id===vesselId);
  const vesselSteepOffset=()=>vessel().steepOffset||0;
  const recommendedSecFor=n=>clamp(tea().base+tea().add*(n-1)+vesselSteepOffset(),5,120);
  function fitPoint(id,x,y){
    const t=VESSEL_FITS[id];
    return t ? {x:t.x+x*t.scale, y:t.y+y*t.scale} : {x,y};
  }
  function fitY(id,y){
    const t=VESSEL_FITS[id];
    return t ? t.y+y*t.scale : y;
  }
  function applyVesselFits(){
    Object.entries(VESSEL_FITS).forEach(([id,t])=>{
      const g=$("v-"+id);
      if(g) g.setAttribute("transform",`matrix(${t.scale} 0 0 ${t.scale} ${t.x} ${t.y})`);
    });
  }

  // ---- audio ----
  let actx=null, muted=false;
  function ensureAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} if(actx&&actx.state==="suspended") actx.resume(); }
  function bell(freq,t0,dur,gain){
    if(!actx) return;
    const master=actx.createGain(); master.gain.value=gain; master.connect(actx.destination);
    [[1,1],[2.0,.5],[2.97,.3],[4.1,.18]].forEach(([r,g],i)=>{
      const o=actx.createOscillator(); o.type="sine"; o.frequency.value=freq*r; o.detune.value=i?(Math.random()*8-4):0;
      const ge=actx.createGain(); ge.gain.setValueAtTime(0,t0); ge.gain.linearRampToValueAtTime(g,t0+.006);
      ge.gain.exponentialRampToValueAtTime(.0001,t0+dur*(1-i*.12));
      o.connect(ge).connect(master); o.start(t0); o.stop(t0+dur+.1);
    });
  }
  function tone(freq,dur,gain){ if(!actx||muted) return; const t=actx.currentTime; const o=actx.createOscillator(); o.type="sine"; o.frequency.value=freq; const ge=actx.createGain(); ge.gain.setValueAtTime(0,t); ge.gain.linearRampToValueAtTime(gain,t+.005); ge.gain.exponentialRampToValueAtTime(.0001,t+dur); o.connect(ge).connect(actx.destination); o.start(t); o.stop(t+dur+.05); }
  const tick=()=>tone(1320,.06,.12);
  const preWarn=()=>tone(784,.5,.16);              // G5
  function chime(){ ensureAudio(); if(!actx||muted) return; const t=actx.currentTime; bell(659.25,t,2.6,.26); bell(987.77,t+.17,2.9,.2); }

  // ---- wake lock ----
  let wakeLock=null;
  async function reqWake(){ try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} }
  function relWake(){ try{ wakeLock&&wakeLock.release(); }catch(e){} wakeLock=null; }
  document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"){ if(phase==="pour"||phase==="steep") reqWake(); } });

  // ---- leaves ----
  function buildLeaves(groupId, anchors){
    const g=$(groupId); g.innerHTML="";
    return anchors.map((a,idx)=>{
      const leaf=document.createElementNS(SVGNS,"g");
      for(let i=0;i<4;i++){ const p=document.createElementNS(SVGNS,"path"); p.setAttribute("d","M0 0 Q6 -15 0 -30 Q-6 -15 0 0 Z"); leaf.appendChild(p); }
      g.appendChild(leaf);
      // seed: 흔들림 위상, delay: 펼침 시차, scaleVar: 잎별 크기 편차
      return {el:leaf, seed:idx*1.7, delay:(idx%3)*0.13, scaleVar:0.88+(idx%4)*0.08, ...a};
    });
  }
  let gLeaves=[], pyLeaves=[];
  function leafProfile(id){
    switch(id){
      case "green":
        return {kind:"long", dry:[76,91,47], wet:[116,148,70], w0:2.8, w1:4.2, len0:24, len1:52, scaleBoost:1.22, alphaBoost:1.38, alphaCap:.72};
      case "black":
        return {kind:"long", dry:[15,13,10], wet:[28,20,14], w0:2.6, w1:3.8, len0:23, len1:50, scaleBoost:1.18, alphaBoost:2.35, alphaCap:.86};
      default:
        return {kind:"broad", dry:[60,74,44], wet:[104,134,68], scaleBoost:1, alphaBoost:1, alphaCap:1};

  }
  function leafPath(profile, open){
    if(profile.kind!=="long") return "M0 0 Q6 -15 0 -30 Q-6 -15 0 0 Z";
    const len=lerp(profile.len0,profile.len1,open), w=lerp(profile.w0,profile.w1,open);
    return [
      "M 0 0",
      `C ${w.toFixed(2)} ${(-len*.28).toFixed(2)} ${(w*.72).toFixed(2)} ${(-len*.72).toFixed(2)} 0 ${(-len).toFixed(2)}`,

      "Z"

  function drawLeaves(arr, open, opts={}){
    const t=performance.now()/1000, ag=agitate;
    const profile=leafProfile(tea().id), dry=profile.dry, wet=profile.wet;
    arr.forEach(L=>{
      const d=L.delay||0, lo=clamp((open-d)/(1-d),0,1);   // 잎마다 시차를 둔 펼침
      const sd=L.seed||0;

      const fill=`rgba(${col[0]|0},${col[1]|0},${col[2]|0},${alpha.toFixed(3)})`;
      const spread=profile.kind==="long" ? lerp(opts.minSpread ?? 7, opts.maxSpread ?? 24, lo) : lerp(opts.minSpread ?? 8, opts.maxSpread ?? 38, lo);
      const scale=lerp(opts.minScale ?? .18, opts.maxScale ?? .48, lo)*(L.scaleVar||1)*profile.scaleBoost;

        p.setAttribute("transform",`rotate(${ang.toFixed(2)}) scale(${scale.toFixed(3)})`);

      L.el.setAttribute("transform",`translate(${(L.x+dx).toFixed(2)} ${(L.y+dy).toFixed(2)}) rotate(${(sway+swirl).toFixed(2)})`);

  const dryLeafSpots=[
    {x:45,y:49,r:-31,s:.76},{x:65,y:38,r:18,s:.9},{x:83,y:52,r:56,s:.72},{x:101,y:35,r:-9,s:.86},

  function renderDryLeafPreview(){
    const svg=els.dryLeaves, profile=dryLeafPreviewProfile(tea().id);

    dryLeafSpots.slice(0,profile.count).forEach((spot,i)=>{

  // ---- format ----

  // ---- rendering ----
  function applyLiquor(rectEl, surfEl, alpha, strength, top, full){
    const col=mix(tea().light, tea().strong, strength);
    if(rectEl){
      els.liquorTop.setAttribute("stop-color", rgb(mix(col, tea().light, .45)));   // 수면 쪽 옅음

  function gaiwanWallAt(y){
    if(y<=152){
      const t=clamp((y-126)/26,0,1);
      return {left:lerp(58,60,t), right:lerp(142,140,t)};
    }
    const t=clamp((y-152)/14,0,1);
    return {left:lerp(60,74,t), right:lerp(140,126,t)};
  }
  function gaiwanLiquidPath(top, lvl){
    const wall=gaiwanWallAt(top), bottom=165.6;
    const contactY=lerp(top,154,0.82), contact=gaiwanWallAt(contactY);
    const low=gaiwanWallAt(162.5);
    const surfaceLift=(reduce?0:Math.sin(performance.now()/720))*0.55*Math.min(1,lvl);
    const bottomRx=lerp(8,24,lvl);
    const topDip=lerp(1.1,2.6,lvl)+surfaceLift;
    return [
      `M ${wall.left.toFixed(2)} ${top.toFixed(2)}`,
      `C ${(wall.left+14).toFixed(2)} ${(top-topDip).toFixed(2)} ${(wall.right-14).toFixed(2)} ${(top-topDip).toFixed(2)} ${wall.right.toFixed(2)} ${top.toFixed(2)}`,
      `C ${(wall.right+.6).toFixed(2)} ${(top+8).toFixed(2)} ${(contact.right+.8).toFixed(2)} ${(contactY-7).toFixed(2)} ${contact.right.toFixed(2)} ${contactY.toFixed(2)}`,
      `C ${(low.right-1.4).toFixed(2)} 159.8 ${(100+bottomRx*1.05).toFixed(2)} ${(bottom-2).toFixed(2)} ${(100+bottomRx*.58).toFixed(2)} ${bottom.toFixed(2)}`,
      `C ${(100+bottomRx*.24).toFixed(2)} ${(bottom+1.4).toFixed(2)} ${(100-bottomRx*.24).toFixed(2)} ${(bottom+1.4).toFixed(2)} ${(100-bottomRx*.58).toFixed(2)} ${bottom.toFixed(2)}`,
      `C ${(100-bottomRx*1.05).toFixed(2)} ${(bottom-2).toFixed(2)} ${(low.left+1.4).toFixed(2)} 159.8 ${contact.left.toFixed(2)} ${contactY.toFixed(2)}`,
      `C ${(contact.left-.8).toFixed(2)} ${(contactY-7).toFixed(2)} ${(wall.left-.6).toFixed(2)} ${(top+8).toFixed(2)} ${wall.left.toFixed(2)} ${top.toFixed(2)}`,
      "Z"
    ].join(" ");
  }
  function gaiwanMeniscusPath(top, lvl){
    const wall=gaiwanWallAt(top);
    const lift=(reduce?0:Math.sin(performance.now()/720))*0.55*Math.min(1,lvl);
    const dip=lerp(1.1,2.6,lvl)+lift;
    return `M ${wall.left.toFixed(2)} ${top.toFixed(2)} C ${(wall.left+14).toFixed(2)} ${(top-dip).toFixed(2)} ${(wall.right-14).toFixed(2)} ${(top-dip).toFixed(2)} ${wall.right.toFixed(2)} ${top.toFixed(2)}`;
  }
  function gaiwanWallWashPath(top, side){
    const y0=top+1.2, y1=lerp(top,154,.82), y2=164.5;
    const w0=gaiwanWallAt(y0), w1=gaiwanWallAt(y1), w2=gaiwanWallAt(y2);
    const outer0=side<0?w0.left:w0.right, outer1=side<0?w1.left:w1.right, outer2=side<0?w2.left:w2.right;
    const inset0=side<0?5.8:-5.8, inset1=side<0?4.8:-4.8, inset2=side<0?2.9:-2.9;
    return [
      `M ${outer0.toFixed(2)} ${y0.toFixed(2)}`,
      `C ${(outer0+side*-0.8).toFixed(2)} ${(top+11).toFixed(2)} ${(outer1+side*-0.7).toFixed(2)} ${(y1-5).toFixed(2)} ${outer1.toFixed(2)} ${y1.toFixed(2)}`,
      `C ${(outer1+side*-0.4).toFixed(2)} ${(y1+6).toFixed(2)} ${(outer2+side*-0.4).toFixed(2)} 159.8 ${outer2.toFixed(2)} ${y2.toFixed(2)}`,
      `L ${(outer2+inset2).toFixed(2)} ${(y2-.8).toFixed(2)}`,
      `C ${(outer1+inset1).toFixed(2)} ${(y1+5).toFixed(2)} ${(outer0+inset0).toFixed(2)} ${(top+10).toFixed(2)} ${(outer0+inset0).toFixed(2)} ${(y0+.6).toFixed(2)}`,
      "Z"
    ].join(" ");
  }
  function applyGaiwanLiquor(alpha, strength, top, lvl){
    const col=mix(tea().light, tea().strong, strength);
    els.liquorTop.setAttribute("stop-color", rgb(mix(col, tea().light, .48)));
    els.liquorBot.setAttribute("stop-color", rgb(mix(col, tea().strong, .35)));
    els.gLiquid.setAttribute("fill","url(#liquorGrad)");
    els.gLiquid.setAttribute("opacity",alpha.toFixed(3));
    els.gLiquid.setAttribute("d",gaiwanLiquidPath(top,lvl));
    els.gMeniscus.setAttribute("d",gaiwanMeniscusPath(top,lvl));
    els.gMeniscus.setAttribute("stroke",rgb(mix(col,[255,248,210],.35)));
    els.gMeniscus.setAttribute("opacity",(alpha*.42).toFixed(3));
    els.gWallLeft.setAttribute("d",gaiwanWallWashPath(top,-1));
    els.gWallRight.setAttribute("d",gaiwanWallWashPath(top,1));
    [els.gWallLeft,els.gWallRight].forEach(el=>{
      el.setAttribute("fill",rgb(mix(col,tea().strong,.38)));
      el.setAttribute("opacity",(alpha*.62*Math.min(1,lvl*1.6)).toFixed(3));

  function setRing(remaining, total, urgent){
    const frac=clamp(remaining/total,0,1);
    els.ringProg.setAttribute("stroke-dashoffset", (ringC*(1-frac)).toFixed(1));
    els.ringTrack.setAttribute("opacity",".25");
    els.ringProg.setAttribute("opacity", urgent?".9":".4");
    els.ringProg.setAttribute("stroke", urgent?"#e4d691":"#8c7f63");
    els.ringProg.setAttribute("stroke-width", urgent?"3":"2");
  }
  function clearRing(){ els.ringProg.setAttribute("opacity","0"); els.ringTrack.setAttribute("opacity","0"); }

  // 김 분출구: 주전자=뚜껑+꼭지, 개완·표일배=뚜껑 테두리 틈새 양쪽, 머그=수면. dx=가로 드리프트
  function steamPorts(){
    switch(vesselId){
      case "teapot":      return [{x:100,y:90,dx:0},{x:32,y:104,dx:-0.42}];   // 뚜껑 · 꼭지
      case "eastern-pot": return [{x:100,y:95,dx:0},{x:42,y:107,dx:-0.38}];   // 뚜껑 · 꼭지
      case "gaiwan":      return [{x:68,y:95,dx:-0.12},{x:132,y:95,dx:0.12}]; // 뚜껑-사발 림 틈새
      case "mug":         return [{...fitPoint("mug",96,82),dx:0}];
      case "piaoyibei":   return [{...fitPoint("piaoyibei",73,52),dx:-0.12},{...fitPoint("piaoyibei",121,52),dx:0.12}]; // 뚜껑-컵 림 틈새
      default:            return [{x:100,y:100,dx:0}];
    }
  }
  function setSteam(intensity){
    const g=els.steam, ports=steamPorts();
    const perPort=Math.round(intensity*3), want=ports.length*perPort;   // 포트당 최대 3가닥
    while(g.children.length<want){ const e=document.createElementNS(SVGNS,"ellipse"); e._t=Math.random(); e._s=0.7+Math.random()*0.6; g.appendChild(e); }
    while(g.children.length>want) g.removeChild(g.lastChild);
    [...g.children].forEach((e,i)=>{
      const port=ports[i%ports.length], k=Math.floor(i/ports.length);
      e._t=(e._t+0.005)%1; const t=e._t, sway=Math.sin(t*6.28+i)*5;
      e.setAttribute("cx", (port.x + port.dx*t*22 + sway + (k-perPort/2)*5).toFixed(1));
      e.setAttribute("cy", (port.y-6 - t*46).toFixed(1));
      e.setAttribute("rx", (4+t*9*e._s).toFixed(1)); e.setAttribute("ry", (6+t*13*e._s).toFixed(1));
      e.setAttribute("fill","#fff7e0"); e.setAttribute("opacity",(Math.sin(Math.PI*t)*0.21).toFixed(3));
    });
  }
  // 수면 일렁임: 시간 기반으로 ellipse 크기를 미세 진동(임박 구간 amp↑)
  function shimmerSurf(el, baseRx, baseRy, lvl){
    if(!el) return;
    const tt=performance.now()/1000, amp=reduce?0:(0.4+0.7*(isUrgent?1:0))*Math.min(1,lvl);
    el.setAttribute("rx",(baseRx + Math.sin(tt*1.7)*amp*1.4).toFixed(2));
    el.setAttribute("ry",(baseRy + Math.sin(tt*2.3+1)*amp).toFixed(2));
  }
  function pyLowerPath(top, amount){
    const cx=97, bottom=190, t=clamp(amount,0,1);
    const topRx=lerp(5,23,t), botRx=lerp(7,16,t);
    const topLift=lerp(0,2.3,t), bottomBulge=lerp(0,1.2,t);
    return [
      `M ${(cx-topRx).toFixed(2)} ${top.toFixed(2)}`,
      `C ${(cx-topRx*.55).toFixed(2)} ${(top-topLift).toFixed(2)} ${(cx+topRx*.55).toFixed(2)} ${(top-topLift).toFixed(2)} ${(cx+topRx).toFixed(2)} ${top.toFixed(2)}`,
      `L ${(cx+botRx).toFixed(2)} ${(bottom-4).toFixed(2)}`,
      `C ${(cx+botRx*.85).toFixed(2)} ${(bottom+bottomBulge).toFixed(2)} ${(cx+botRx*.36).toFixed(2)} ${(bottom+bottomBulge).toFixed(2)} ${cx} ${bottom.toFixed(2)}`,
      `C ${(cx-botRx*.36).toFixed(2)} ${(bottom+bottomBulge).toFixed(2)} ${(cx-botRx*.85).toFixed(2)} ${(bottom+bottomBulge).toFixed(2)} ${(cx-botRx).toFixed(2)} ${(bottom-4).toFixed(2)}`,
      "Z"
    ].join(" ");
  }
  // 물줄기가 떨어지는 착지 높이(도구별 입구)
  function pourLandY(){ return vesselId==="gaiwan"?122 : vesselId==="piaoyibei"?fitY("piaoyibei",108) : vesselId==="mug"?fitY("mug",82) : vesselId==="eastern-pot"?100 : 95; }

  function render(){
    const v=vessel();
    // gaiwan
    if(vesselId==="gaiwan"){
      const top=lerp(166,130,level);
      applyGaiwanLiquor(curAlpha*Math.min(1,level*1.4)*.92, strengthT, top, level);
      drawLeaves(gLeaves, openEff, {baseAlpha:.02, peakAlpha:.34, minSpread:6, maxSpread:30, minScale:.12, maxScale:.36});
      els.gLid.setAttribute("opacity","0");
    } else if(vesselId==="piaoyibei"){
      // steep: chamber fills (level), color deepens; drain: chamber empties, lower fills
      const chTop=lerp(144,108,level), chAlpha=curAlpha*(1-drain);
      applyLiquor(els.pyChamber, els.pyChSurf, chAlpha*Math.min(1,level*1.4)*.82, strengthT, chTop, 144);
      shimmerSurf(els.pyChSurf, lerp(11,21,level), 4.8, level);
      const lowTop=lerp(190,154,drain);   // 손잡이 하단 살짝 밑까지 차오름
      const lowCol=rgb(mix(tea().light,tea().strong,strengthT));
      [...els.pyLowerGrad.children].forEach(s=>s.setAttribute("stop-color",lowCol)); // 깊이 그라데이션(바닥 페이드)
      els.pyLower.setAttribute("d",pyLowerPath(lowTop, drain));
      els.pyLower.setAttribute("opacity", drain>0?".42":"0");
      els.pyLowerSurf.setAttribute("cy",lowTop);
      els.pyLowerSurf.setAttribute("rx",lerp(0,23,drain).toFixed(2));
      els.pyLowerSurf.setAttribute("opacity", drain>.05?".34":"0");
      drawLeaves(pyLeaves, openEff, {baseAlpha:.03, peakAlpha:.42, minSpread:6, maxSpread:32, minScale:.13, maxScale:.38});
    } else if(vesselId==="mug"){
      const col=mix(tea().light,tea().strong,strengthT);
      const visible=curAlpha*Math.min(1,level*1.4);
      els.mugSurfCenter.setAttribute("stop-color",rgb(mix(col,[255,248,218],.18)));
      els.mugSurfEdge.setAttribute("stop-color",rgb(mix(col,tea().strong,.08)));
      els.mugSurf.setAttribute("opacity",(visible*.78).toFixed(3));
    }
    // ambient glow for opaque vessels — 따뜻한 앰버 글로우, 임박 시 throb
    if(v.vis==="none" || v.vis==="top"){
      let amb=glow*0.30;
      if(isUrgent && !reduce) amb*=0.8+0.4*(0.5+0.5*Math.sin(performance.now()/220));
      els.ambient.setAttribute("opacity",amb.toFixed(3));
      els.ambient.setAttribute("cy", v.round?124:120);
    } else els.ambient.setAttribute("opacity","0");

    // pour: 물줄기 하강 + 착지 잔물결 (붓는 중에만)
    if(phase==="pour"){
      const land=pourLandY();
      els.pour.setAttribute("opacity","1");
      els.pourStream.setAttribute("height", Math.max(0,(land-48)*clamp(level*2,0,1)).toFixed(1));
      const rip=clamp((level-0.4)/0.6,0,1);
      els.pourRipple.setAttribute("cy",land);
      els.pourRipple.setAttribute("rx",(rip*22).toFixed(1)); els.pourRipple.setAttribute("ry",(rip*5).toFixed(1));
      els.pourRipple.setAttribute("opacity",((1-rip)*0.5).toFixed(3));
    } else els.pour.setAttribute("opacity","0");

    setSteam(phase==="steep"? (0.3+0.7*strengthT) : phase==="done"?0.7:0);
  }

  function previewIdle(){
    level=0; curAlpha=0; strengthT=0; openEff=0; glow=0; drain=0;
    lidLift=0; lidTarget=0; isUrgent=false; agitate=0;
    els.time.textContent=fmt(sec*1000); els.timeLabel.textContent="";
    els.timeLabel.setAttribute('aria-live','polite'); els.timeLabel.classList.remove("gold"); els.readout.classList.remove("done"); els.hero.classList.remove("urgent");
    setTeaPickerActive(true);
    clearRing(); render();
  }

  // ---- phases ----
  function startBrew(){
    ensureAudio(); reqWake();
    setTeaPickerActive(false);
    activeBrew={n:infusion, sec};
    updateInfusionLine();
    preWarnSec=clamp(Math.round(sec*0.2),3,5); preWarned=false; lastTick=-1; drain=0;
    els.brew.disabled=true; els.slider.disabled=true;
    els.timeLabel.setAttribute('aria-live','polite'); els.timeLabel.classList.remove("gold"); els.readout.classList.remove("done");
    if(reduce){ level=1; enterSteep(performance.now()); return; }
    phase="pour"; pourStart=performance.now(); level=0; els.brew.textContent="물 붓는 중…";
  }
  function enterSteep(now){
    phase="steep"; steepStart=now; steepMs=sec*1000; level=1; lidTarget=0;
    els.brew.textContent="우리는 중…";
  }
  function finishSteep(){
    phase="done"; curAlpha=tea().peak; strengthT=1; openEff=1; glow=1; isUrgent=false; agitate=0;
    setTeaPickerActive(vesselId!=="piaoyibei", {showPreview:false});
    els.time.textContent="0:00";
    els.hero.classList.remove("urgent"); els.readout.classList.add("done");
    const v=vessel();
    recordActiveBrew();
    if(v.done==="lid") lidTarget=1;
    els.timeLabel.setAttribute('aria-live','assertive');
    els.timeLabel.textContent=v.completion;
    els.timeLabel.classList.add("gold");
    $("flash").classList.remove("go"); void $("flash").offsetWidth; $("flash").classList.add("go");
    chime();
    clearRing();
    els.slider.disabled=false; els.brew.disabled=false;
    if(vesselId==="piaoyibei"){ pyDrained=false; els.brew.textContent="버튼 눌러 내리기"; }
    else { prepareNextInfusion(); els.brew.textContent="다음 泡 우리기"; }
    relWake(); render();
  }
  function drainPiao(cb){
    const t0=performance.now(), dur=reduce?1:1400;
    (function step(now){ drain=clamp((now-t0)/dur,0,1); render(); if(drain<1) requestAnimationFrame(step); else cb&&cb(); })(t0);
  }
  function reset(){
    phase="idle"; infusion=1; sec=recommendedSecFor(infusion); pyDrained=false; infusionHistory=[]; activeBrew=null;
    setInf(); syncSlider(); previewIdle();
    els.brew.disabled=false; els.slider.disabled=false; els.brew.textContent="우리기 시작";
    relWake();
  }
  function setInf(){ $("infLabel").textContent=infText(infusion); $("infKo").textContent=koInf(infusion); }
  function recordActiveBrew(){
    const b=activeBrew || {n:infusion, sec};
    if(!infusionHistory.some(h=>h.n===b.n)) infusionHistory.push({n:b.n, sec:b.sec});
    activeBrew=null;
    updateInfusionLine();
  }
  function prepareNextInfusion(){
    const last=infusionHistory[infusionHistory.length-1];
    infusion=(last?.n || infusion)+1;
    sec=recommendedSecFor(infusion);
    setInf(); syncSlider();
  }

  // ---- loop ----
  function frame(now){
    const dt=Math.min(now-lastNow,60); lastNow=now;
    lidLift += (lidTarget-lidLift)*(reduce?1:0.1);
    if(phase==="pour"){
      const t=clamp((now-pourStart)/900,0,1); level=ease(t); glow=Math.min(1,glow+dt*0.002);
      agitate=clamp((now-pourStart)/250,0,1);                       // 붓는 즉시 난류 최고조
      if(t>=1) enterSteep(now);
    } else if(phase==="steep"){
      const elapsed=now-steepStart, remaining=steepMs-elapsed;
      const lin=clamp(elapsed/steepMs,0,1);
      agitate=reduce?0:clamp(1-(now-steepStart)/1500,0,1);          // 우림 시작 후 1.5초간 난류가 잦아듦
      const col=reduce?1:sat(lin);   // 탕색/농도: 초반 빠른 추출
      const opn=reduce?1:ease(lin);  // 찻잎 펼침: 완만한 재수화
      curAlpha=lerp(0,tea().peak,col); strengthT=Math.min(1,col); openEff=clamp(opn*1.15,0,1); glow=Math.min(1,0.3+col);
      els.time.textContent=fmt(remaining);
      const urgent = remaining<=preWarnSec*1000+50;
      isUrgent = urgent && !reduce;
      setRing(remaining, steepMs, urgent);
      els.hero.classList.toggle("urgent", urgent && !reduce);
      els.timeLabel.textContent = urgent ? "곧 따라낼 준비" : "";
      els.timeLabel.classList.toggle("gold", urgent);
      const remSec=Math.ceil(remaining/1000);
      if(!preWarned && remaining<=preWarnSec*1000){ preWarned=true; preWarn(); lastTick=remSec; }
      else if(preWarned && remSec!==lastTick && remSec>0 && remSec<=preWarnSec){ lastTick=remSec; tick(); }
      if(remaining<=0) finishSteep();
    } else if(phase==="done"){
      glow=Math.max(0.6, glow);
    }
    if(phase!=="done"||vesselId!=="piaoyibei") render();
    requestAnimationFrame(frame);
  }

  // ---- events ----
  els.brew.onclick=()=>{
    if(phase==="idle"){ startBrew(); return; }
    if(phase==="done"){
      if(vesselId==="piaoyibei" && !pyDrained){
        pyDrained=true; els.brew.disabled=true; els.brew.textContent="내리는 중…";
        drainPiao(()=>{ prepareNextInfusion(); setTeaPickerActive(true, {showPreview:false}); els.brew.disabled=false; els.brew.textContent="다음 泡 우리기"; els.timeLabel.textContent="出湯 · 아래 잔에 차"; });
        return;
      }
      startBrew();
    }
  };
  $("reset").onclick=reset;
  $("vesselPrev").onclick=()=>selectVessel(-1);
  $("vesselNext").onclick=()=>selectVessel(1);
  $("teaPrev").onclick=()=>selectTea(teaIdx-1);
  $("teaNext").onclick=()=>selectTea(teaIdx+1);
  $("mute").onclick=function(){ muted=!muted; this.classList.toggle("muted",muted); this.setAttribute("aria-pressed",muted); this.setAttribute("aria-label",muted?"소리 켜기":"소리 끄기"); ensureAudio(); if(!muted) tone(880,.5,.12); };
  $("applause").onclick=openClapModal;
  $("clapClose").onclick=closeClapModal;
  $("clapDismiss").onclick=closeClapModal;
  $("clapYes").onclick=()=>finishClapModal("감사합니다", "감사합니다 덕분에 큰 힘이 되었습니다!", "clap");
  $("clapNo").onclick=()=>finishClapModal("의견 고마워요", "괜찮습니다. 앞으로 더 노력해서 다음에는 박수를 받을 수 있도록 힘내보겠습니다!", "down");
  els.clapModal.addEventListener("click",e=>{ if(e.target===els.clapModal) closeClapModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&!els.clapModal.hidden) closeClapModal(); });

  // swipe on hero for vessel
  let sx=0; els.hero.addEventListener("touchstart",e=>{ sx=e.touches[0].clientX; },{passive:true});
  els.hero.addEventListener("touchend",e=>{ const dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>40) selectVessel(dx<0?1:-1); },{passive:true});

  // ---- boot ----
  function boot(){
    applyVesselFits();
    buildDots(); buildSegState(); paintTea();
    gLeaves=buildLeaves("g-leaves",[{x:100,y:164,base:0},{x:87,y:160,base:70},{x:113,y:160,base:140},{x:95,y:156,base:210},{x:105,y:156,base:300}]);
    pyLeaves=buildLeaves("py-leaves",[{x:100,y:139,base:0},{x:90,y:135,base:120},{x:110,y:136,base:240}]);
    sec=recommendedSecFor(infusion); syncSlider(); setInf(); previewIdle();
    requestAnimationFrame(frame);
  }
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(boot); else boot();

  // ---- service worker (PWA, only when hosted) ----
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
})();
</script>
</body>
